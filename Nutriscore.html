<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Comparateur - Saphir</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/@ericblade/quagga2/dist/quagga.min.js"></script>
    <style>
        :root { --accent: #27ae60; }
        body { background-color: #f0f2f5; font-family: sans-serif; }
        #interactive.viewport { position: relative; width: 100%; height: 300px; overflow: hidden; border-radius: 15px; background: #000; }
        #interactive.viewport canvas, video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .product-card { border: none; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: none; }
        .nutriscore { width: 100px; border-radius: 5px; }
        .scan-btn { border-radius: 50px; padding: 15px 30px; font-weight: bold; background: var(--accent); border: none; }
    </style>
</head>
<body>

<div class="container py-4">
    <header class="text-center mb-4">
        <h1 class="fw-bold" style="color: var(--accent)">🛒 ScanComparo</h1>
        <p class="text-muted">Scannez le code-barres pour comparer</p>
    </header>

    <div class="card p-3 mb-4 shadow-sm border-0" style="border-radius: 20px;">
        <div id="scanner-container">
            <div id="interactive" class="viewport"></div>
        </div>
        <div class="d-grid mt-3">
            <button id="startBtn" class="btn btn-primary scan-btn" onclick="startScanner()">Démarrer le Scan</button>
        </div>
        <div class="mt-3">
            <input type="text" id="manualBarcode" class="form-control text-center" placeholder="Ou tapez le code-barres (ex: 3017620422003)">
            <button class="btn btn-link w-100 text-decoration-none" onclick="fetchProduct(document.getElementById('manualBarcode').value)">Chercher manuellement</button>
        </div>
    </div>

    <div id="productResult" class="card product-card p-4">
        <div class="row align-items-center">
            <div class="col-4">
                <img id="pImg" src="" class="img-fluid rounded" alt="Produit">
            </div>
            <div class="col-8">
                <h4 id="pName" class="fw-bold mb-1 text-dark"></h4>
                <p id="pBrand" class="text-muted mb-2"></p>
                <div id="scores" class="d-flex gap-2"></div>
            </div>
        </div>
        
        <hr>
        
        <h5 class="fw-bold mb-3">📍 Comparer les prix :</h5>
        <div class="list-group">
            <a id="linkGoogle" href="#" target="_blank" class="list-group-item list-group-item-action d-flex justify-content-between">
                <span>Google Shopping (Prix local)</span>
                <span class="text-primary">Voir →</span>
            </a>
            <a id="linkDrive" href="#" target="_blank" class="list-group-item list-group-item-action d-flex justify-content-between">
                <span>Prix Drive & Supermarchés</span>
                <span class="text-primary">Voir →</span>
            </a>
        </div>
    </div>
</div>

<script>
    function startScanner() {
        document.getElementById('startBtn').innerText = "Scan en cours...";
        Quagga.init({
            inputStream: { name: "Live", type: "LiveStream", target: document.querySelector('#interactive') },
            decoder: { readers: ["ean_reader", "ean_8_reader"] }
        }, (err) => {
            if (err) return alert("Erreur caméra : " + err);
            Quagga.start();
        });

        Quagga.onDetected((data) => {
            Quagga.stop();
            document.getElementById('startBtn').innerText = "Redémarrer le Scan";
            fetchProduct(data.codeResult.code);
        });
    }

    async function fetchProduct(barcode) {
        const res = await fetch(`https://world.openfoodfacts.org/api/v0/product/${barcode}.json`);
        const data = await res.json();

        if (data.status === 0) return alert("Produit non trouvé !");

        const p = data.product;
        document.getElementById('productResult').style.display = "block";
        document.getElementById('pName').innerText = p.product_name || "Nom inconnu";
        document.getElementById('pBrand').innerText = p.brands || "Marque inconnue";
        document.getElementById('pImg').src = p.image_url || "https://via.placeholder.com/150";

        // Liens de comparaison de prix dynamiques
        document.getElementById('linkGoogle').href = `https://www.google.com/search?q=${encodeURIComponent(p.product_name + " " + (p.brands || ""))}#tbm=shop`;
        document.getElementById('linkDrive').href = `https://fr.openfoodfacts.org/produit/${barcode}`;

        // Affichage Nutriscore
        const scoreDiv = document.getElementById('scores');
        scoreDiv.innerHTML = p.nutrition_grades ? 
            `<span class="badge bg-success text-uppercase p-2">Nutri-Score ${p.nutrition_grades}</span>` : '';
    }
</script>

</body>
</html>

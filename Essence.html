<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarbuVite - Comparateur Temps Réel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --main-blue: #0061ff; --soft-bg: #f4f7f6; }
        body { background-color: var(--soft-bg); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .hero-section { background: linear-gradient(135deg, #0061ff 0%, #60efff 100%); color: white; padding: 40px 0; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; margin-bottom: 30px; }
        .search-card { margin-top: -50px; border-radius: 20px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .station-card { border-radius: 15px; border: none; transition: 0.3s ease; height: 100%; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .station-card:hover { transform: translateY(-5px); box-shadow: 0 12px 20px rgba(0,0,0,0.1); }
        .price-box { background: #f8f9fa; border-radius: 10px; padding: 8px; margin-bottom: 8px; border-left: 4px solid var(--main-blue); }
        .price-val { font-weight: 800; color: #2d3436; font-size: 1.1rem; }
        .fuel-name { font-size: 0.85rem; color: #636e72; text-transform: uppercase; }
        .badge-dist { position: absolute; top: 15px; right: 15px; background: #e17055; color: white; }
        #loader { display: none; }
    </style>
</head>
<body>

    <section class="hero-section text-center">
        <div class="container">
            <h1 class="fw-bold">⛽ CarbuVite</h1>
            <p>Prix officiels en direct (Flux 2026)</p>
        </div>
    </section>

    <div class="container">
        <div class="card search-card p-4 mb-4">
            <div class="row g-3">
                <div class="col-md-7">
                    <label class="form-label fw-bold">Votre adresse ou ville</label>
                    <input type="text" id="addressInput" class="form-control form-control-lg" placeholder="Ex: 15 rue de Rivoli, Paris">
                </div>
                <div class="col-md-3">
                    <label class="form-label fw-bold">Carburant</label>
                    <select id="fuelType" class="form-select form-select-lg">
                        <option value="gazole">Diesel (Gazole)</option>
                        <option value="sp95">Sans Plomb 95 (E10)</option>
                        <option value="sp98">Sans Plomb 98</option>
                    </select>
                </div>
                <div class="col-md-2 d-grid">
                    <label class="form-label">&nbsp;</label>
                    <button onclick="fetchPrices()" class="btn btn-primary btn-lg fw-bold">Trouver</button>
                </div>
            </div>
        </div>

        <div id="loader" class="text-center my-5">
            <div class="spinner-grow text-primary" role="status"></div>
            <p class="mt-2 text-muted">Recherche des meilleures stations...</p>
        </div>

        <div id="results" class="row g-4 mb-5">
            </div>
    </div>

    <script>
        async function fetchPrices() {
            const address = document.getElementById('addressInput').value;
            const fuel = document.getElementById('fuelType').value;
            const resultsDiv = document.getElementById('results');
            const loader = document.getElementById('loader');

            if (!address) return alert("Veuillez saisir une adresse");

            resultsDiv.innerHTML = "";
            loader.style.display = "block";

            try {
                // 1. Géocodage de l'adresse (API Gouvernementale)
                const geoRes = await fetch(`https://api-adresse.data.gouv.fr/search/?q=${encodeURIComponent(address)}&limit=1`);
                const geoData = await geoRes.json();
                
                if (geoData.features.length === 0) throw new Error("Adresse non reconnue.");
                
                const [lon, lat] = geoData.features[0].geometry.coordinates;

                // 2. Récupération des prix (Rayon 10km, trié par le prix du carburant choisi)
                // API: data.economie.gouv.fr
                const fuelApiUrl = `https://data.economie.gouv.fr/api/explore/v2.1/catalog/datasets/prix-des-carburants-en-france-flux-instantane-v2/records?where=within_distance(geom%2C%20geom'POINT(${lon}%20${lat})'%2C%2010km)&order_by=${fuel}_prix&limit=12`;

                const fuelRes = await fetch(fuelApiUrl);
                const fuelData = await fuelRes.json();

                if (fuelData.results.length === 0) {
                    resultsDiv.innerHTML = `<div class="col-12 text-center text-muted">Désolé, aucune station trouvée dans un rayon de 10km.</div>`;
                } else {
                    renderStations(fuelData.results);
                }

            } catch (err) {
                alert("Erreur: " + err.message);
            } finally {
                loader.style.display = "none";
            }
        }

        function renderStations(stations) {
            const resultsDiv = document.getElementById('results');
            
            stations.forEach(s => {
                const card = `
                    <div class="col-md-6 col-lg-4">
                        <div class="card station-card p-3">
                            <span class="badge badge-dist rounded-pill">Station active</span>
                            <div class="card-body">
                                <h6 class="fw-bold mb-1 text-primary">${s.adresse || 'Station Service'}</h6>
                                <p class="small text-muted mb-3">${s.ville ? s.ville.toUpperCase() : 'Ville inconnue'}</p>
                                
                                <div class="price-box d-flex justify-content-between align-items-center">
                                    <span class="fuel-name">Gazole</span>
                                    <span class="price-val">${s.gazole_prix ? s.gazole_prix.toFixed(3) + '€' : '--'}</span>
                                </div>
                                <div class="price-box d-flex justify-content-between align-items-center" style="border-left-color: #00b894;">
                                    <span class="fuel-name">SP95-E10</span>
                                    <span class="price-val">${s.e10_prix ? s.e10_prix.toFixed(3) + '€' : '--'}</span>
                                </div>
                                <div class="price-box d-flex justify-content-between align-items-center" style="border-left-color: #6c5ce7;">
                                    <span class="fuel-name">Sans Plomb 98</span>
                                    <span class="price-val">${s.sp98_prix ? s.sp98_prix.toFixed(3) + '€' : '--'}</span>
                                </div>
                                <div class="mt-3 text-end">
                                    <a href="https://www.google.com/maps/search/?api=1&query=${s.latitude/100000},${s.longitude/100000}" target="_blank" class="btn btn-sm btn-outline-secondary">📍 Y aller</a>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                resultsDiv.innerHTML += card;
            });
        }
    </script>
</body>
  </html>

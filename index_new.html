<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAPHIR LIVE | Expérience Piano Dynamique</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@300;400;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        :root {
            --bg-black: #000000;
            --saphir-blue: #0044ff; 
            --text-main: #ffffff;
            --grid-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; overflow-x: hidden; background: #000; }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-black);
            color: var(--text-main);
            line-height: 1.4;
        }

        /* NAVIGATION LATERALE */
        nav {
            position: fixed;
            left: 0; top: 0; height: 100vh;
            width: 80px;
            border-right: 1px solid var(--grid-border);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 40px 0;
            background: var(--bg-black);
            z-index: 1000;
        }
        .nav-logo { transform: rotate(-90deg); color: var(--saphir-blue); font-family: 'Syncopate'; font-size: 1.2rem; white-space: nowrap; text-decoration: none;}

        main { margin-left: 80px; }

        section {
            padding: 150px 10%;
            min-height: 100vh;
            border-bottom: 1px solid var(--grid-border);
            display: flex;
            flex-direction: column;
            justify-content: center;
            opacity: 0; /* Caché par défaut pour l'animation */
            transform: translateY(30px);
            transition: all 1s ease-out;
        }

        /* Classe active quand on scroll (JS) */
        section.reveal {
            opacity: 1;
            transform: translateY(0);
        }

        .hero-big-text { 
            font-size: clamp(3rem, 15vw, 10rem); 
            font-family: 'Syncopate'; 
            line-height: 0.8;
            text-shadow: 0 0 30px rgba(0, 68, 255, 0.3);
        }

        .section-title { 
            font-size: clamp(2rem, 8vw, 6rem); 
            font-family: 'Syncopate';
            margin-bottom: 40px;
            color: var(--saphir-blue);
        }

        /* GRILLE MEDIA DYNAMIQUE */
        .media-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }
        .media-item {
            overflow: hidden;
            border: 1px solid var(--grid-border);
            background: #050505;
            transition: 0.5s;
        }
        .media-item:hover { border-color: var(--saphir-blue); transform: scale(1.02); }
        .media-item img { 
            width: 100%; height: 400px; object-fit: cover; 
            filter: grayscale(1); transition: 1s;
        }
        .media-item:hover img { filter: grayscale(0); }

        /* PIANO FIXE */
        .piano-fixed {
            position: fixed;
            bottom: 0; right: 0;
            width: calc(100% - 80px);
            height: 70px;
            background: #fff;
            display: flex;
            z-index: 2000;
            border-top: 5px solid var(--saphir-blue);
        }
        .key { flex: 1; border-right: 1px solid #ddd; cursor: pointer; transition: 0.2s; }
        .key:hover { background: var(--saphir-blue); }
        .key.black { background: #000; height: 60%; flex: 0.6; margin: 0 -0.3%; z-index: 2; border: none;}

        @media (max-width: 768px) {
            nav { display: none; }
            main { margin-left: 0; }
            .media-grid { grid-template-columns: 1fr; }
            .piano-fixed { width: 100%; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="#accueil" class="nav-logo">SAPHIR LIVE</a>
        <div style="color:var(--saphir-blue)"><i class="fab fa-instagram fa-2x"></i></div>
    </nav>

    <main>
        <section id="accueil" class="reveal">
            <h1 class="hero-big-text">SAPHIR<br>LIVE</h1>
            <p style="letter-spacing: 10px; margin-top: 20px; color: var(--saphir-blue);">PIANISTE CONCERTISTE</p>
        </section>

        <section id="bio">
            <h2 class="section-title">01. BIO</h2>
            <div style="max-width: 800px; font-size: 1.5rem; font-weight: 200;">
                <p>Une immersion sonore dans le <strong>noir</strong> et le <strong>bleu</strong>. Saphir Live n'est pas qu'un concert, c'est une performance visuelle et sensitive.</p>
            </div>
        </section>

        <section id="videos">
            <h2 class="section-title">02. VIDEOS</h2>
            <div class="media-grid">
                <div class="media-item">
                    <iframe width="100%" height="400" src="https://www.youtube.com/embed/dQw4w9WgXcQ" frameborder="0" allowfullscreen></iframe>
                </div>
                <div class="media-item">
                    <iframe width="100%" height="400" src="https://www.youtube.com/embed/dQw4w9WgXcQ" frameborder="0" allowfullscreen></iframe>
                </div>
            </div>
        </section>

        <section id="photos">
            <h2 class="section-title">03. PHOTOS</h2>
            <div class="media-grid">
                <div class="media-item"><img src="https://images.unsplash.com/photo-1520527053876-aa266691c5d4?auto=format&fit=crop&w=800"></div>
                <div class="media-item"><img src="https://images.unsplash.com/photo-1552422535-c45813c61732?auto=format&fit=crop&w=800"></div>
            </div>
        </section>

        <section id="contact">
            <h2 class="section-title">04. CONTACT</h2>
            <a href="mailto:contact@saphir-live.fr" style="font-size: 3rem; color: #fff; text-decoration: none; border-bottom: 2px solid var(--saphir-blue);">contact@saphir-live.fr</a>
        </section>
    </main>

    <div class="piano-fixed">
        <div class="key"></div><div class="key black"></div><div class="key"></div><div class="key black"></div><div class="key"></div><div class="key"></div><div class="key black"></div><div class="key"></div><div class="key black"></div><div class="key"></div><div class="key black"></div><div class="key"></div><div class="key"></div><div class="key black"></div><div class="key"></div><div class="key black"></div><div class="key"></div><div class="key"></div><div class="key black"></div><div class="key"></div><div class="key black"></div><div class="key"></div><div class="key black"></div><div class="key"></div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        // 1. Initialisation AOS
        AOS.init();

        // 2. Script de secours (Reveal au scroll manuel)
        function reveal() {
            var reveals = document.querySelectorAll("section");
            for (var i = 0; i < reveals.length; i++) {
                var windowHeight = window.innerHeight;
                var elementTop = reveals[i].getBoundingClientRect().top;
                var elementVisible = 150;
                if (elementTop < windowHeight - elementVisible) {
                    reveals[i].classList.add("reveal");
                }
            }
        }

        window.addEventListener("scroll", reveal);

        // Lancer une fois au chargement
        reveal();
    </script>
</body>
</html>
